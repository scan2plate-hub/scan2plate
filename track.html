<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Order - Scan2Plate</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    .track-shell{
      max-width:1100px;
      margin:0 auto;
    }
    .track-search-grid{
      display:grid;
      grid-template-columns:1fr 220px;
      gap:14px;
      align-items:end;
    }
    .track-card{
      margin-top:18px;
      padding:18px;
    }
    .track-status-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      font-weight:800;
      background:#fff3cd;
      color:#8a6d3b;
      margin:10px 0 16px;
    }
    .track-countdown{
      font-size:28px;
      font-weight:800;
      margin:8px 0 16px;
    }
    .track-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }
    .track-box{
      border:1px solid #eee;
      border-radius:16px;
      padding:14px;
      background:#fff;
    }
    .track-items{
      margin-top:10px;
      border-top:1px solid #eee;
      padding-top:10px;
    }
    .track-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:8px 0;
    }
    .edit-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:18px;
    }
    .menu-picker-card{
      border:1px solid #eee;
      border-radius:14px;
      padding:12px;
      margin-bottom:10px;
    }
    .qty-wrap{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .qty-btn{
      width:32px;
      height:32px;
      border:none;
      border-radius:8px;
      background:#111;
      color:#fff;
      font-size:18px;
      cursor:pointer;
    }
    .notice-box{
      padding:12px 14px;
      border-radius:14px;
      background:#fff8e1;
      border:1px solid #f1dd9c;
      color:#7a5b00;
      margin-top:14px;
    }
    .danger-box{
      padding:12px 14px;
      border-radius:14px;
      background:#fdecec;
      border:1px solid #f2bcbc;
      color:#9f2f2f;
      margin-top:14px;
    }
    @media (max-width: 820px){
      .track-search-grid,
      .track-grid,
      .edit-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <div class="logo">
        <div class="logo-badge">S2</div>
        <div>
          <div>Scan2Plate</div>
          <div class="small muted">Track your order live</div>
        </div>
      </div>
      <div class="nav-links">
        <a class="btn btn-outline" href="./index.html">Customer Page</a>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="card track-shell">
        <h1 style="margin-top:0">Track your order</h1>

        <div class="track-search-grid">
          <div>
            <label class="label">Order ID or Phone Number</label>
            <input class="input" id="searchInput" placeholder="ORDxxxx or 9876543210" />
          </div>
          <div>
            <button class="btn btn-primary" id="trackBtn" style="width:100%;">Track Now</button>
          </div>
        </div>

        <div id="trackResult"></div>
      </div>
    </div>
  </section>

  <script type="module" src="./js/track.js"></script>
</body>
</html>
