<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Generator - Scan2Plate</title>
  <style>
    :root{--orange:#e07c1a;--dark:#1f1712;--cream:#fffaf3;--line:#eee0d2;--muted:#7c6959}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#fff8ee,#fffdf9);color:var(--dark);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}.container{width:min(1160px,calc(100% - 32px));margin:0 auto}.topbar{padding:15px 0;border-bottom:1px solid var(--line);background:rgba(255,253,250,.9);backdrop-filter:blur(12px)}.nav{display:flex;justify-content:space-between;align-items:center;gap:14px}.brand{display:flex;align-items:center;gap:10px}.mark{display:grid;place-items:center;width:39px;height:39px;border-radius:12px;background:linear-gradient(135deg,#f5a340,#d7670b);color:#fff;font-weight:900}.brand strong{display:block;font-size:16px}.brand span{display:block;margin-top:2px;color:var(--muted);font-size:11px}.links{display:flex;gap:8px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:42px;padding:0 14px;border:1px solid transparent;border-radius:10px;background:var(--orange);color:#fff;text-decoration:none;font:inherit;font-size:13px;font-weight:800;cursor:pointer}.btn.ghost{border-color:#e7d9cb;background:#fff;color:#604b38}.hero{padding:42px 0 25px}.hero h1{margin:0;font-size:clamp(31px,4vw,47px);letter-spacing:-.055em}.hero p{max-width:630px;margin:12px 0 0;color:var(--muted);line-height:1.65}.panel{padding:22px;border:1px solid var(--line);border-radius:19px;background:#fff;box-shadow:0 13px 29px rgba(68,39,8,.06)}.form{display:grid;grid-template-columns:1.3fr 1fr 1fr auto;gap:12px;align-items:end}.field label{display:block;margin-bottom:6px;color:#725d4b;font-size:12px;font-weight:800}.input{width:100%;height:44px;padding:0 12px;border:1px solid #e8d9ca;border-radius:10px;font:inherit;outline:none}.input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(224,124,26,.12)}.notice{display:none;margin-top:14px;padding:12px 14px;border-radius:11px;font-size:13px}.notice.show{display:block}.notice.error{background:#fff0ef;color:#ad332d;border:1px solid #f5c7c3}.notice.success{background:#effaf2;color:#227447;border:1px solid #c4e8ce}.action-row{display:flex;justify-content:space-between;gap:12px;align-items:center;margin:24px 0 16px;flex-wrap:wrap}.action-row h2{margin:0;font-size:19px}.action-buttons{display:flex;gap:8px;flex-wrap:wrap}.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:16px;padding-bottom:42px}.qr-card{position:relative;padding:20px;border:1px solid var(--line);border-radius:19px;background:#fff;box-shadow:0 10px 24px rgba(69,39,7,.06);text-align:center;overflow:hidden}.qr-card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#f4a13b,var(--orange))}.qr-brand{display:flex;justify-content:center;align-items:center;gap:7px;margin-bottom:10px;font-size:12px;font-weight:900}.qr-brand span{display:grid;place-items:center;width:22px;height:22px;border-radius:7px;background:var(--orange);color:#fff;font-size:10px}.qr-restaurant{color:var(--muted);font-size:11px;overflow-wrap:anywhere}.table-no{margin:5px 0 13px;font-size:22px;font-weight:900}.qr-card img{display:block;width:220px;height:220px;max-width:100%;margin:0 auto;border:8px solid #fff8ef;border-radius:12px}.scan-copy{margin-top:12px;font-size:13px;font-weight:850}.url{display:block;margin-top:7px;color:var(--muted);font:10px ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.4;overflow-wrap:anywhere}.empty{padding:45px 20px;text-align:center;color:var(--muted)}@media(max-width:700px){.container{width:min(100% - 24px,1160px)}.nav{align-items:flex-start}.links{justify-content:flex-end}.links .btn{padding:0 10px;min-height:38px;font-size:11px}.hero{padding:31px 0 20px}.panel{padding:17px}.form{grid-template-columns:1fr 1fr}.form .field:first-child,.form .btn{grid-column:1/-1}.action-buttons .btn{flex:1}.qr-grid{grid-template-columns:1fr}}@media print{body{background:#fff}.topbar,.hero,.panel,.action-row,.notice{display:none!important}.container{width:100%;margin:0}.qr-grid{grid-template-columns:repeat(3,1fr);gap:8px;padding:8px}.qr-card{box-shadow:none;border:1px solid #bbb;break-inside:avoid;padding:12px}.qr-card img{width:170px;height:170px}.url{font-size:8px}}
    .app-logo{width:42px;height:42px;object-fit:contain;border-radius:12px;background:#fff;padding:4px;box-shadow:0 6px 16px rgba(0,0,0,.08);flex-shrink:0}.qr-brand .app-logo{width:22px;height:22px;padding:2px;border-radius:7px;box-shadow:none}
  </style>
</head>
<body>
  <header class="topbar"><div class="container nav"><div class="brand"><img src="./assets/logo.PNG" alt="Scan2Plate Logo" class="app-logo"><div><strong>QR Generator</strong><span>Scan2Plate ordering</span></div></div><div class="links"><a class="btn ghost" href="./super-admin-dashboard.html">Dashboard</a><a class="btn ghost" href="./restaurant-list.html">Restaurants</a></div></div></header>
  <main class="container"><section class="hero"><h1 id="heroTitle">Create table-wise QR codes</h1><p id="heroCopy">Generate shareable Scan2Plate ordering links instantly.</p></section><section class="panel"><div class="form"><div class="field"><label for="restaurantId">Restaurant ID</label><input id="restaurantId" class="input" placeholder="RST006" autocomplete="off" /></div><div class="field table-field"><label for="startTable">Start table</label><input id="startTable" class="input" type="number" min="1" value="1" /></div><div class="field table-field"><label for="endTable">End table</label><input id="endTable" class="input" type="number" min="1" value="10" /></div><button id="generateBtn" class="btn" type="button">Generate QR Codes</button></div><div id="msg" class="notice" role="status"></div></section><div class="action-row"><h2 id="resultTitle">QR cards</h2><div class="action-buttons"><button id="downloadCsvBtn" class="btn ghost" type="button" disabled>Download Links CSV</button><button id="printBtn" class="btn ghost" type="button" disabled>Print QR Cards</button></div></div><section id="qrGrid" class="qr-grid"><div class="empty">Enter a restaurant ID and table range to generate QR cards.</div></section></main>
  <script type="module">
    import { db } from "./js/firebase.js";
    import { doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    (() => {
      const restaurantIdEl = document.getElementById("restaurantId"), startEl = document.getElementById("startTable"), endEl = document.getElementById("endTable"), generateBtn = document.getElementById("generateBtn"), grid = document.getElementById("qrGrid"), msg = document.getElementById("msg"), csvBtn = document.getElementById("downloadCsvBtn"), printBtn = document.getElementById("printBtn"), title = document.getElementById("resultTitle"), heroTitle = document.getElementById("heroTitle"), heroCopy = document.getElementById("heroCopy");
      let generated = [];
      const params = new URLSearchParams(window.location.search);
      restaurantIdEl.value = (params.get("restaurantId") || params.get("r") || "").trim();
      startEl.value = params.get("start") || params.get("startTable") || "1";
      endEl.value = params.get("end") || params.get("endTable") || "10";
      const escapeHtml = value => String(value).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#39;");
      const showMessage = (text, type) => { msg.textContent = text; msg.className = `notice show ${type}`; };
      const baseUrl = () => window.location.origin + window.location.pathname.replace(/qr-generator\.html$/i, "index.html");
      const padTable = table => String(table).padStart(2, "0");
      async function generate() {
        try {
          const restaurantId = restaurantIdEl.value.trim(); const start = Number(startEl.value); const end = Number(endEl.value);
          if (!restaurantId) throw new Error("Enter a Restaurant ID to generate QR codes.");
          const restaurantSnap = await getDoc(doc(db, "restaurants", restaurantId));
          if (!restaurantSnap.exists()) throw new Error("Restaurant not found.");
          const vendor = restaurantSnap.data().businessMode === "vendor" || ["token", "hybrid"].includes(restaurantSnap.data().orderMode);
          document.querySelectorAll(".table-field").forEach(el => el.style.display = vendor ? "none" : "");
          heroTitle.textContent = vendor ? "Generate Vendor QR" : "Create table-wise QR codes";
          heroCopy.textContent = vendor ? "One QR for counter pickup orders and daily token numbers." : "Generate shareable Scan2Plate ordering links instantly.";
          generateBtn.textContent = vendor ? "Generate Vendor QR" : "Generate QR Codes";
          if (vendor) {
            const qrUrl = `${baseUrl()}?restaurantId=${encodeURIComponent(restaurantId)}`;
            generated = [{ restaurantId, tableNo: "", qrUrl, imageUrl:`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrUrl)}`, vendor:true }];
            await setDoc(doc(db, "restaurants", restaurantId, "vendor_qr", "main"), { restaurantId, vendorId:restaurantId, qrUrl, customerMenuUrl:qrUrl, orderMode:restaurantSnap.data().orderMode || "token", createdAt:serverTimestamp(), updatedAt:serverTimestamp() }, { merge:true });
            grid.innerHTML = generated.map(card => `<article class="qr-card"><div class="qr-brand"><img src="./assets/logo.PNG" alt="Scan2Plate Logo" class="app-logo"> Scan2Plate</div><div class="qr-restaurant">${escapeHtml(card.restaurantId)}</div><div class="table-no">Counter Pickup</div><img src="${card.imageUrl}" alt="Vendor QR code for ${escapeHtml(card.restaurantId)}" /><div class="scan-copy">Scan to order</div><span class="url">${escapeHtml(card.qrUrl)}</span></article>`).join("");
            title.textContent = "Vendor QR generated"; csvBtn.disabled = false; printBtn.disabled = false; showMessage("Vendor QR generated and saved successfully.", "success"); return;
          }
          if (!Number.isInteger(start) || start < 1) throw new Error("Start table must be 1 or greater.");
          if (!Number.isInteger(end) || end < start) throw new Error("End table must be greater than or equal to start table.");
          if (end - start + 1 > 100) throw new Error("Generate a maximum of 100 table QR codes at a time.");
          generated = Array.from({ length:end-start+1 }, (_, index) => { const tableNo = padTable(start + index); const qrUrl = `${baseUrl()}?restaurantId=${encodeURIComponent(restaurantId)}&table=${encodeURIComponent(tableNo)}`; return { restaurantId, tableNo, qrUrl, imageUrl:`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrUrl)}` }; });
          await Promise.all(generated.map(card => setDoc(doc(db, "restaurants", restaurantId, "table_qrs", card.tableNo), { restaurantId, tableNo:card.tableNo, qrUrl:card.qrUrl, customerMenuUrl:card.qrUrl, createdAt:serverTimestamp(), updatedAt:serverTimestamp() }, { merge:true })));
          grid.innerHTML = generated.map(card => `<article class="qr-card"><div class="qr-brand"><img src="./assets/logo.PNG" alt="Scan2Plate Logo" class="app-logo"> Scan2Plate</div><div class="qr-restaurant">${escapeHtml(card.restaurantId)}</div><div class="table-no">Table ${escapeHtml(card.tableNo)}</div><img src="${card.imageUrl}" alt="QR code for ${escapeHtml(card.restaurantId)} table ${escapeHtml(card.tableNo)}" /><div class="scan-copy">Scan to order</div><span class="url">${escapeHtml(card.qrUrl)}</span></article>`).join("");
          title.textContent = `${generated.length} QR card${generated.length === 1 ? "" : "s"} generated`; csvBtn.disabled = false; printBtn.disabled = false; showMessage("QR codes generated and saved successfully. You can print cards or download all direct links.", "success");
        } catch (error) { console.error("QR generation error:", error); generated = []; grid.innerHTML = `<div class="empty">${escapeHtml(error.message || "Unable to generate QR codes.")}</div>`; csvBtn.disabled = true; printBtn.disabled = true; showMessage(error.message || "Failed to generate QR codes.", "error"); }
      }
      generateBtn.addEventListener("click", generate); [restaurantIdEl,startEl,endEl].forEach(input => input.addEventListener("keydown", event => { if (event.key === "Enter") generate(); }));
      printBtn.addEventListener("click", () => window.print());
      csvBtn.addEventListener("click", () => { if (!generated.length) return; const csv = [["restaurantId","tableNo","qrUrl"], ...generated.map(card => [card.restaurantId,card.tableNo,card.qrUrl])].map(row => row.map(value => `"${String(value).replaceAll('"','""')}"`).join(",")).join("\n"); const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"})); link.download = `${generated[0].restaurantId}-qr-links.csv`; link.click(); URL.revokeObjectURL(link.href); });
      if (restaurantIdEl.value) generate();
    })();
  </script>
</body>
</html>
