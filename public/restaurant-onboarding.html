<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Restaurant Onboarding - Scan2Plate</title><style>
:root{--orange:#e07c1a;--dark:#1f1712;--cream:#fffaf3;--line:#eddfd1;--muted:#796757}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--dark);font-family:Arial,sans-serif}.container{width:min(1100px,calc(100% - 32px));margin:auto}.top{padding:15px 0;background:#fff;border-bottom:1px solid var(--line)}.nav,.head,.actions{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.brand{font-weight:900}.brand b{display:inline-grid;place-items:center;width:34px;height:34px;margin-right:8px;border-radius:10px;background:var(--orange);color:#fff}.sub,.muted{color:var(--muted);font-size:12px}.hero{padding:32px 0 18px}.hero h1{margin:0;font-size:37px}.hero p{color:var(--muted)}.card{padding:20px;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:0 10px 24px #512d0b0d}.form{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end}.label{display:block;margin-bottom:6px;font-size:12px;font-weight:bold}.input{width:100%;height:43px;border:1px solid #e8d9ca;border-radius:10px;padding:0 12px;font:inherit}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:41px;padding:0 13px;border:0;border-radius:10px;background:var(--orange);color:#fff;text-decoration:none;font-size:12px;font-weight:bold;cursor:pointer}.btn.ghost{background:#fff;border:1px solid #e7d8ca;color:#5f4b38}.notice{display:none;margin-top:13px;padding:12px;border-radius:10px}.notice.show{display:block}.notice.error{background:#fff0ef;color:#a8322b}.notice.loading{background:#fff4e4;color:#91540c}.sheet{display:none;margin:22px 0 40px}.sheet.show{display:block}.sheet h2{margin:0;font-size:26px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:16px}.block{padding:16px;border:1px solid var(--line);border-radius:14px}.block.full{grid-column:1/-1}.block h3{margin:0 0 10px;font-size:15px}.row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid #f5ece4;font-size:13px}.row span{color:var(--muted)}.row strong{text-align:right;overflow-wrap:anywhere}.badge{padding:5px 8px;border-radius:999px;font-size:10px;font-weight:bold}.active{background:#e9f8ee;color:#177342}.basic{background:#fff1df;color:#a25500}.advance{background:#e9f8ee;color:#177342}.enterprise{background:#f1ebff;color:#6840a2}.links,.checks{display:grid;grid-template-columns:1fr 1fr;gap:8px}.links a,.check{padding:10px;border:1px solid #eadbcd;border-radius:10px;color:#5d4938;text-decoration:none;font-size:12px;overflow-wrap:anywhere}.check.done{background:#effaf2}.check.todo{background:#fffaf4}.qr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.qr{padding:14px;border:1px solid #eadbcd;border-radius:13px;text-align:center}.qr b{font-size:18px}.qr img{display:block;width:170px;height:170px;max-width:100%;margin:10px auto;border:6px solid #fff7ed;border-radius:10px}.qr small{display:block;color:var(--muted);font:10px monospace;overflow-wrap:anywhere}@media(max-width:680px){.container{width:min(100% - 24px,1100px)}.hero h1{font-size:29px}.form,.grid,.links,.checks{grid-template-columns:1fr}.qr-grid{grid-template-columns:1fr 1fr}}@media print{.top,.hero,.load-card,.no-print{display:none!important}.container{width:100%}.sheet{display:block!important;border:0;box-shadow:none;padding:8mm}.qr-grid{grid-template-columns:repeat(3,1fr)}.qr{break-inside:avoid}.qr img{width:145px;height:145px}}
.app-logo{width:42px;height:42px;object-fit:contain;border-radius:12px;background:#fff;padding:4px;box-shadow:0 6px 16px rgba(0,0,0,.08);flex-shrink:0}.qr .app-logo{width:22px;height:22px;padding:2px;border-radius:7px;box-shadow:none;vertical-align:middle}</style></head><body>
<header class="top"><div class="container nav"><div class="brand"><img src="./assets/logo.PNG" alt="Scan2Plate Logo" class="app-logo">Restaurant Onboarding <span class="sub">Scan2Plate setup summary</span></div><div class="actions no-print"><a class="btn ghost" href="./super-admin-dashboard.html">Dashboard</a><a class="btn ghost" href="./qr-generator.html">QR Generator</a></div></div></header>
<main class="container"><section class="hero no-print"><h1>Printable restaurant setup sheet</h1><p>Load business, plan, payment, location, and saved table QR details from Firestore.</p></section><section class="card load-card no-print"><div class="form"><div><label class="label" for="restaurantId">Restaurant ID</label><input id="restaurantId" class="input" placeholder="RST006"></div><button id="loadBtn" class="btn">Load Sheet</button></div><div id="msg" class="notice"></div></section><section id="sheetRoot" class="card sheet"></section></main>
<script type="module">
import {db} from "./js/firebase.js";import {doc,getDoc,collection,getDocs} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const $=id=>document.getElementById(id),idEl=$("restaurantId"),load=$("loadBtn"),msg=$("msg"),root=$("sheetRoot");const params=new URLSearchParams(location.search);idEl.value=(params.get("restaurantId")||params.get("r")||"").trim();
const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");const date=v=>{if(!v)return"—";const d=v.toDate?v.toDate():typeof v.seconds==="number"?new Date(v.seconds*1000):new Date(v);return Number.isNaN(d)?String(v):d.toLocaleDateString("en-IN")};const url=(page,id,extra="")=>`${location.origin}${location.pathname.replace(/restaurant-onboarding\.html$/i,page)}?restaurantId=${encodeURIComponent(id)}${extra}`;const note=(text,type)=>{msg.textContent=text;msg.className=`notice show ${type}`};
function check(label,done){return`<div class="check ${done?"done":"todo"}">${done?"✓":"!"} ${label}</div>`}function qrSection(qrs,id){if(!qrs.length)return`<article class="block full"><div class="head"><h3>Generated Table QR Codes</h3><a class="btn no-print" href="${url("qr-generator.html",id,"&start=1&end=10")}">Generate QR Codes</a></div><p class="muted">No QR codes generated yet.</p></article>`;const cards=qrs.map(q=>{const table=String(q.tableNo||q.id).padStart(2,"0"),link=q.customerMenuUrl||q.qrUrl||url("index.html",id,`&table=${table}`),img=`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(link)}`;return`<div class="qr"><div class="brand"><img src="./assets/logo.PNG" alt="Scan2Plate Logo" class="app-logo">Scan2Plate</div><div class="muted">${esc(id)}</div><b>Table ${esc(table)}</b><img src="${img}" alt="Table ${esc(table)} QR"><div>Scan to Order</div><small>${esc(link)}</small></div>`}).join("");return`<article id="generatedQrSection" class="block full"><div class="head"><h3>Generated Table QR Codes</h3><button id="printQrBtn" class="btn ghost no-print">Print QR Codes</button></div><div class="qr-grid">${cards}</div></article>`}
async function loadSheet(){const id=idEl.value.trim();if(!id)return note("Enter a Restaurant ID.","error");console.log("Loading onboarding sheet for:",id);load.disabled=true;load.textContent="Loading…";note("Loading restaurant setup and QR codes…","loading");root.classList.remove("show");try{const [restSnap,settingsSnap,menuSnap,qrSnap]=await Promise.all([getDoc(doc(db,"restaurants",id)),getDoc(doc(db,"restaurants",id,"settings","general")),getDocs(collection(db,"restaurants",id,"menu")),getDocs(collection(db,"restaurants",id,"table_qrs"))]);if(!restSnap.exists())return note("Restaurant not found. Please check Restaurant ID.","error");const r=restSnap.data(),s=settingsSnap.exists()?settingsSnap.data():{},qrs=qrSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(a.tableNo||a.id).localeCompare(String(b.tableNo||b.id),undefined,{numeric:true}));console.log("Restaurant data:",r);const name=r.restaurantName||r.name||id,plan=String(r.plan||"basic").toLowerCase(),status=String(r.status||"active").toLowerCase(),lat=s.restaurantLat??r.restaurantLat,lng=s.restaurantLng??r.restaurantLng,customer=url("index.html",id,"&table=01");root.innerHTML=`<div class="head"><div><h2>${esc(name)}</h2><p class="muted">Restaurant ID: ${esc(id)} · Generated ${new Date().toLocaleString("en-IN")}</p></div><div class="actions no-print"><button id="printBtn" class="btn ghost">Print Sheet</button><a class="btn" href="${url("qr-generator.html",id,"&start=1&end=10")}">Generate QR Codes</a></div></div><div class="grid"><article class="block"><h3>Restaurant Details</h3>${[["Restaurant Name",name],["Restaurant ID",id],["Owner Name",r.ownerName||"—"],["Admin Email",r.adminEmail||r.email||"—"],["Phone",r.phone||s.phone||"—"],["Address",r.address||s.address||"—"],["Start Date",date(r.planStartDate||r.createdAt)],["Expiry Date",date(r.planExpiryDate||r.expiryDate)]].map(x=>`<div class="row"><span>${x[0]}</span><strong>${esc(x[1])}</strong></div>`).join("")}<div class="row"><span>Plan</span><strong><i class="badge ${plan}">${esc(plan)}</i></strong></div><div class="row"><span>Status</span><strong><i class="badge ${status==="active"?"active":"basic"}">${esc(status)}</i></strong></div></article><article class="block"><h3>Payment & Location</h3>${[["UPI ID",s.upiId||r.upiId||"—"],["Tax %",s.taxPercent??r.taxPercent??"—"],["GST Number",s.gstNumber||r.gstNumber||"—"],["Latitude",lat??"—"],["Longitude",lng??"—"],["Allowed Radius",(s.allowedOrderRadiusMeters??r.allowedOrderRadiusMeters)?`${s.allowedOrderRadiusMeters??r.allowedOrderRadiusMeters} m`:"—"]].map(x=>`<div class="row"><span>${x[0]}</span><strong>${esc(x[1])}</strong></div>`).join("")}</article><article class="block full"><h3>System Setup</h3><div class="links"><a href="./admin-login.html">Admin Login</a><a href="${customer}">Customer Menu Link<br><small>${esc(customer)}</small></a><a href="./kitchen-dashboard.html">Kitchen Dashboard</a><a href="./track.html">Track Order</a><a href="${url("qr-generator.html",id,"&start=1&end=10")}">QR Generator</a></div></article><article class="block full"><h3>Setup Checklist</h3><div class="checks">${check("Restaurant Created",true)}${check("Admin Login Ready",!!(r.adminEmail||r.email))}${check(`Menu Items Added (${menuSnap.size})`,menuSnap.size>0)}${check(`QR Codes Generated (${qrs.length})`,qrs.length>0)}${check("Kitchen Dashboard Ready",plan!=="basic")}${check("UPI Added",!!(s.upiId||r.upiId))}${check("Location Protection Added",lat!=null&&lng!=null)}</div></article>${qrSection(qrs,id)}</div>`;root.classList.add("show");$("printBtn").onclick=()=>print();$("printQrBtn")&&( $("printQrBtn").onclick=()=>{const w=open("","_blank");w.document.write(`<html><head><title>Table QR Codes</title><style>body{font-family:Arial;padding:15px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.qr{border:1px solid #ddd;padding:12px;text-align:center;break-inside:avoid}.qr img{width:160px;height:160px;display:block;margin:8px auto}small{word-break:break-all;font-size:8px}</style></head><body><h2>Scan2Plate · ${esc(name)}</h2><div class="grid">${document.querySelector("#generatedQrSection .qr-grid").innerHTML}</div></body></html>`);w.document.close();setTimeout(()=>w.print(),250)});msg.className="notice"}catch(error){console.error("Onboarding sheet error:",error);note("Unable to load QR codes. Check Firebase rules or Restaurant ID.","error")}finally{load.disabled=false;load.textContent="Load Sheet"}}
load.onclick=loadSheet;idEl.onkeydown=e=>{if(e.key==="Enter")loadSheet()};if(idEl.value)loadSheet();
</script></body></html>
