<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Order - Scan2Plate</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    :root { --track-line:#e9e9ed; --track-muted:#666; --track-brand:#f39a2b; }
    body { background:#fafafa; }
    .topbar { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.95); backdrop-filter:blur(10px); }
    .track-shell { max-width:900px; margin:0 auto; }
    .track-search { display:grid; grid-template-columns:1fr auto; gap:10px; align-items:end; padding:18px; }
    .track-search label { display:block; margin-bottom:6px; font-size:13px; font-weight:700; }
    .track-card { margin-top:16px; padding:24px; }
    .order-title-row,.section-heading { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; }
    .order-title-row h1 { margin:0 0 5px; font-size:24px; }
    .eyebrow { margin:0 0 6px; color:var(--track-muted); font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    .live-indicator { display:inline-flex; align-items:center; gap:7px; border-radius:999px; padding:7px 10px; background:#e6fcf5; color:#087f5b; font-size:12px; font-weight:800; }
    .live-indicator i { width:8px; height:8px; border-radius:50%; background:#20c997; }
    .track-section { border:1px solid var(--track-line); border-radius:16px; padding:16px; background:#fff; }
    .track-section h2 { margin:0 0 12px; font-size:15px; }
    .live-status { margin:20px 0; border-color:#f5d2a4; background:#fffaf3; }
    .status-display { font-size:25px; line-height:1.15; font-weight:800; color:#9a5a0a; }
    .status-display.ready,.status-display.completed { color:#087f5b; }
    .status-display.cancelled,.status-display.rejected { color:#c92a2a; }
    .status-note { margin:8px 0 0; color:var(--track-muted); }
    .status-note.exception { color:#c92a2a; font-weight:600; }
    .status-timeline { display:flex; gap:0; margin-top:18px; overflow-x:auto; padding-bottom:3px; }
    .timeline-step { position:relative; min-width:92px; flex:1; color:#8b8b93; font-size:11px; font-weight:700; text-align:center; }
    .timeline-step:not(:last-child)::after { content:""; position:absolute; top:13px; left:calc(50% + 14px); width:calc(100% - 28px); height:2px; background:#ddd; }
    .timeline-dot { position:relative; z-index:1; display:grid; place-items:center; width:28px; height:28px; margin:0 auto 7px; border-radius:50%; background:#e9e9ed; color:#777; }
    .timeline-step.done,.timeline-step.current { color:#9a5a0a; }
    .timeline-step.done .timeline-dot { background:#37b24d; color:#fff; }
    .timeline-step.current .timeline-dot { background:var(--track-brand); color:#fff; box-shadow:0 0 0 4px rgba(243,154,43,.18); }
    .timeline-step.done:not(:last-child)::after { background:#37b24d; }
    .track-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; }
    .summary-list { margin:0; }
    .summary-list div,.item-row { display:flex; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px solid #f0f0f2; font-size:14px; }
    .summary-list div:last-child,.item-row:last-child { border-bottom:0; }
    .summary-list dt { color:var(--track-muted); }.summary-list dd { margin:0; font-weight:650; text-align:right; }
    .grand-total { padding-top:12px !important; margin-top:4px; border-top:1px solid var(--track-line); font-size:16px; }.grand-total dd { font-weight:800; }
    .item-row small { color:var(--track-muted); }.payment-badge { border-radius:999px; padding:7px 11px; font-size:12px; font-weight:800; }.payment-badge.paid { background:#e6fcf5; color:#087f5b; }.payment-badge.unpaid { background:#fff4e6; color:#c05621; }
    .help-section { margin-top:16px; }.help-section p { margin:0; }.help-section a { font-weight:700; color:#111; }
    .track-message { margin-top:16px; border-radius:14px; padding:14px 16px; }.track-message.loading { display:flex; align-items:center; gap:10px; background:#fff8e1; color:#7a5b00; }.track-message.error { background:#fff5f5; color:#c92a2a; border:1px solid #ffc9c9; }
    .loading-spinner { width:16px; height:16px; border:2px solid #f2d58c; border-top-color:#a96700; border-radius:50%; animation:spin .8s linear infinite; }@keyframes spin { to { transform:rotate(360deg); } }
    .sticky-actions { display:none; }
    @media (max-width:640px) { .topbar .small,.nav-links { display:none; }.topbar .nav { min-height:56px; }.section { padding:14px 0 82px; }.track-search { grid-template-columns:1fr; padding:14px; }.track-search .btn { width:100%; }.track-card { margin-top:12px; padding:16px; }.order-title-row h1 { font-size:21px; }.track-grid { grid-template-columns:1fr; gap:12px; margin-top:12px; }.track-section { padding:14px; }.status-display { font-size:23px; }.timeline-step { min-width:76px; font-size:10px; }.sticky-actions { position:fixed; display:grid; grid-template-columns:1fr 1fr; gap:10px; left:12px; right:12px; bottom:calc(12px + env(safe-area-inset-bottom)); z-index:15; }.sticky-actions .btn { box-shadow:0 10px 24px rgba(0,0,0,.14); }.sticky-actions .btn-outline { background:#fff; } }
  </style>
</head>
<body>
  <header class="topbar"><div class="container nav"><div class="logo"><img src="./assets/logo.PNG" alt="Scan2Plate Logo" class="app-logo"><div><div>Scan2Plate</div><div class="small muted">Live order tracking</div></div></div><div class="nav-links"><a class="btn btn-outline" href="./index.html">Menu</a></div></div></header>
  <main class="section"><div class="container"><div class="card track-shell"><div class="track-search"><div><label for="searchInput">Order ID or phone number</label><input class="input" id="searchInput" autocomplete="off" placeholder="ORD123 or 9876543210" /></div><button class="btn btn-primary" id="trackBtn" type="button">Track Order</button></div><div id="trackResult" aria-live="polite"></div></div></div></main>
  <div class="sticky-actions"><button id="stickyRefreshBtn" class="btn btn-primary" type="button">Refresh view</button><button id="stickyHelpBtn" class="btn btn-outline" type="button">Get help</button></div>
  <script type="module" src="./js/track.js"></script>
</body>
</html>
