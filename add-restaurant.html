<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Add Restaurant - Scan2Plate</title><link rel="stylesheet" href="./css/style.css" /></head>
<body><header class="topbar"><div class="container nav"><div class="logo"><div class="logo-badge">S2</div><div><div>Add Restaurant</div><div class="small muted">Super Admin</div></div></div><div class="nav-links"><a class="btn btn-outline" href="./super-admin-dashboard.html">Dashboard</a><a class="btn btn-outline" href="./restaurant-list.html">Restaurants</a></div></div></header>
<section class="section"><div class="container" style="max-width:980px"><div class="card"><div class="section-title"><h2>Create Restaurant + Admin</h2></div><div class="form-grid"><div><label class="label">Restaurant ID</label><input class="input" id="restaurantId" placeholder="RST001" /></div><div><label class="label">Restaurant Name</label><input class="input" id="restaurantName" placeholder="Old Monk" /></div><div><label class="label">Owner Name</label><input class="input" id="ownerName" placeholder="Owner name" /></div><div><label class="label">Phone</label><input class="input" id="phone" placeholder="+919142579601" /></div><div><label class="label">Restaurant Email</label><input class="input" id="email" placeholder="oldmonk@example.com" /></div><div><label class="label">Plan</label><select class="select" id="plan"><option value="basic">Basic</option><option value="pro">Pro</option><option value="premium">Premium</option></select></div><div><label class="label">Monthly Amount</label><input class="input" id="amount" type="number" value="1999" /></div><div><label class="label">Status</label><select class="select" id="status"><option value="active">Active</option><option value="suspended">Suspended</option></select></div><div><label class="label">Expiry Date</label><input class="input" id="expiryDate" type="date" /></div><div><label class="label">Table Count</label><input class="input" id="tableCount" type="number" value="10" /></div><div><label class="label">Admin Name</label><input class="input" id="adminName" placeholder="Restaurant Admin" /></div><div><label class="label">Admin Email</label><input class="input" id="adminEmail" placeholder="admin@oldmonk.com" /></div></div><div style="margin-top:14px"><label class="label">Address</label><textarea class="input" id="address" rows="3" placeholder="Restaurant address"></textarea></div><button class="btn btn-primary" id="saveRestaurantBtn" style="margin-top:16px">Create Restaurant</button><div id="msg" class="notice hidden" style="margin-top:14px"></div></div></div></section>
<script type="module" src="./js/add-restaurant.js"></script></body></html>
